<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Personality Quiz - Seeker</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ff6633",
                        "background-light": "#f8f6f5",
                        "background-dark": "#23140f",
                        "surface-dark": "#2f1b15", 
                        "glass": "rgba(255,255,255,0.04)",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                    backgroundImage: {
                        'flame-gradient': 'linear-gradient(135deg, #ff6633 0%, #ff9e44 100%)',
                        'cosmic-gradient': 'radial-gradient(circle at 50% 0%, #3e2219 0%, #23140f 100%)',
                    }
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar for better aesthetic */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #23140f; 
        }
        ::-webkit-scrollbar-thumb {
            background: #4b2b20; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6b3d2e; 
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col overflow-x-hidden selection:bg-primary selection:text-white">
<!-- Background decorative element -->
<div class="fixed inset-0 z-0 pointer-events-none bg-cosmic-gradient opacity-80"></div>
<!-- Stars/Dust effect (simulated with radial gradients) -->
<div class="fixed top-0 left-0 right-0 h-[500px] z-0 pointer-events-none opacity-20" style="background: radial-gradient(circle at 50% 30%, #ff6633 0%, transparent 60%);"></div>
<div class="relative z-10 flex flex-col min-h-screen">
<!-- Header -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-white/10 px-6 lg:px-10 py-4 bg-[#23140f]/80 backdrop-blur-md sticky top-0 z-50">
<div class="flex items-center gap-4 text-slate-900 dark:text-white">
<div class="size-8 text-primary">
<span class="material-symbols-outlined !text-[32px]">explore</span>
</div>
<h2 class="text-slate-900 dark:text-white text-xl font-bold leading-tight tracking-tight">Seeker</h2>
</div>
<div class="hidden md:flex flex-1 justify-end gap-8 items-center">
<nav class="flex items-center gap-9">
<a class="text-slate-500 dark:text-slate-300 hover:text-primary dark:hover:text-primary transition-colors text-sm font-medium leading-normal" href="#">Home</a>
<a class="text-slate-500 dark:text-slate-300 hover:text-primary dark:hover:text-primary transition-colors text-sm font-medium leading-normal" href="#">Explore</a>
<a class="text-slate-500 dark:text-slate-300 hover:text-primary dark:hover:text-primary transition-colors text-sm font-medium leading-normal" href="#">My Path</a>
<a class="text-slate-900 dark:text-white text-sm font-bold leading-normal border-b-2 border-primary pb-0.5" href="#">Quiz</a>
</nav>
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-full h-10 px-6 bg-primary/10 text-primary hover:bg-primary hover:text-white transition-all duration-300 text-sm font-bold leading-normal tracking-wide border border-primary/20">
<span class="truncate">Log In</span>
</button>
</div>
<!-- Mobile Menu Icon -->
<button class="md:hidden text-white">
<span class="material-symbols-outlined">menu</span>
</button>
</header>
<!-- Main Content -->
<main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6">
<div class="w-full max-w-4xl flex flex-col gap-8">
<!-- Progress Section -->
<div class="flex flex-col gap-4">
<div class="flex items-end justify-between px-2">
<div class="flex flex-col gap-1">
<p class="text-primary text-sm font-bold uppercase tracking-wider">Step 3 of 6</p>
<h1 class="text-slate-900 dark:text-white text-3xl font-bold">Personality Analysis</h1>
</div>
<p class="text-slate-400 dark:text-slate-400 text-sm font-medium font-mono bg-white/5 px-3 py-1 rounded-lg border border-white/5">3 / 6</p>
</div>
<div class="h-2 w-full bg-[#3e2219] rounded-full overflow-hidden shadow-inner">
<div class="h-full bg-flame-gradient rounded-full shadow-[0_0_15px_rgba(255,102,51,0.6)] animate-pulse" style="width: 50%;"></div>
</div>
</div>
<!-- Glassmorphic Card -->
<div class="rounded-xl border border-white/10 bg-glass backdrop-blur-xl p-8 shadow-2xl relative overflow-hidden group">
<!-- Decorative corner glow -->
<div class="absolute -top-20 -right-20 w-64 h-64 bg-primary/10 rounded-full blur-3xl pointer-events-none"></div>
<div class="relative z-10 flex flex-col gap-8">
<div class="flex flex-col gap-2 items-center text-center">
<span class="text-5xl mb-2 filter drop-shadow-lg">🎨</span>
<h2 class="text-slate-900 dark:text-white text-2xl md:text-3xl font-bold leading-tight">How do you like to express your ideas?</h2>
<p class="text-slate-500 dark:text-slate-400 text-base max-w-xl">Select the option that best resonates with your natural style of communication.</p>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Option 1 -->
<label class="group/item relative flex items-start gap-4 rounded-lg border border-white/10 bg-white/5 hover:bg-white/10 p-5 cursor-pointer transition-all duration-300 hover:border-primary/50 hover:shadow-[0_0_20px_rgba(255,102,51,0.15)]">
<input class="peer sr-only" name="expression_style" type="radio"/>
<div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-surface-dark border border-white/20 text-slate-400 font-mono text-sm group-hover/item:border-primary group-hover/item:text-primary transition-colors">A</div>
<div class="flex grow flex-col gap-1">
<p class="text-slate-900 dark:text-white text-lg font-bold leading-tight group-hover/item:text-primary transition-colors">Written words &amp; stories</p>
<p class="text-slate-500 dark:text-[#ce9d8d] text-sm font-normal leading-normal">Essays, blogs, fiction, or journaling.</p>
</div>
<div class="absolute inset-0 rounded-lg border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary/5 pointer-events-none transition-all"></div>
</label>
<!-- Option 2 -->
<label class="group/item relative flex items-start gap-4 rounded-lg border border-white/10 bg-white/5 hover:bg-white/10 p-5 cursor-pointer transition-all duration-300 hover:border-primary/50 hover:shadow-[0_0_20px_rgba(255,102,51,0.15)]">
<input class="peer sr-only" name="expression_style" type="radio"/>
<div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-surface-dark border border-white/20 text-slate-400 font-mono text-sm group-hover/item:border-primary group-hover/item:text-primary transition-colors">B</div>
<div class="flex grow flex-col gap-1">
<p class="text-slate-900 dark:text-white text-lg font-bold leading-tight group-hover/item:text-primary transition-colors">Speaking &amp; presenting</p>
<p class="text-slate-500 dark:text-[#ce9d8d] text-sm font-normal leading-normal">Debates, speeches, teaching, or vlogging.</p>
</div>
<div class="absolute inset-0 rounded-lg border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary/5 pointer-events-none transition-all"></div>
</label>
<!-- Option 3 (Selected State Simulation) -->
<label class="group/item relative flex items-start gap-4 rounded-lg border-2 border-primary bg-primary/10 p-5 cursor-pointer transition-all duration-300 shadow-[0_0_20px_rgba(255,102,51,0.2)]">
<input checked="" class="peer sr-only" name="expression_style" type="radio"/>
<div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-primary text-white font-mono text-sm shadow-sm font-bold">C</div>
<div class="flex grow flex-col gap-1">
<p class="text-primary text-lg font-bold leading-tight">Visual art or designs</p>
<p class="text-slate-500 dark:text-[#ffbfb0] text-sm font-normal leading-normal">Drawing, painting, digital design, or UI/UX.</p>
</div>
<!-- Checkmark Icon for Selected -->
<div class="absolute top-4 right-4 text-primary">
<span class="material-symbols-outlined text-2xl">check_circle</span>
</div>
</label>
<!-- Option 4 -->
<label class="group/item relative flex items-start gap-4 rounded-lg border border-white/10 bg-white/5 hover:bg-white/10 p-5 cursor-pointer transition-all duration-300 hover:border-primary/50 hover:shadow-[0_0_20px_rgba(255,102,51,0.15)]">
<input class="peer sr-only" name="expression_style" type="radio"/>
<div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-surface-dark border border-white/20 text-slate-400 font-mono text-sm group-hover/item:border-primary group-hover/item:text-primary transition-colors">D</div>
<div class="flex grow flex-col gap-1">
<p class="text-slate-900 dark:text-white text-lg font-bold leading-tight group-hover/item:text-primary transition-colors">Logic, code, or systems</p>
<p class="text-slate-500 dark:text-[#ce9d8d] text-sm font-normal leading-normal">Puzzles, programming, algorithms, or math.</p>
</div>
<div class="absolute inset-0 rounded-lg border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary/5 pointer-events-none transition-all"></div>
</label>
<!-- Option 5 -->
<label class="group/item relative flex items-start gap-4 rounded-lg border border-white/10 bg-white/5 hover:bg-white/10 p-5 cursor-pointer transition-all duration-300 hover:border-primary/50 hover:shadow-[0_0_20px_rgba(255,102,51,0.15)]">
<input class="peer sr-only" name="expression_style" type="radio"/>
<div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-surface-dark border border-white/20 text-slate-400 font-mono text-sm group-hover/item:border-primary group-hover/item:text-primary transition-colors">E</div>
<div class="flex grow flex-col gap-1">
<p class="text-slate-900 dark:text-white text-lg font-bold leading-tight group-hover/item:text-primary transition-colors">Building physical objects</p>
<p class="text-slate-500 dark:text-[#ce9d8d] text-sm font-normal leading-normal">Crafting, engineering, mechanics, or DIY.</p>
</div>
<div class="absolute inset-0 rounded-lg border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary/5 pointer-events-none transition-all"></div>
</label>
<!-- Option 6 -->
<label class="group/item relative flex items-start gap-4 rounded-lg border border-white/10 bg-white/5 hover:bg-white/10 p-5 cursor-pointer transition-all duration-300 hover:border-primary/50 hover:shadow-[0_0_20px_rgba(255,102,51,0.15)]">
<input class="peer sr-only" name="expression_style" type="radio"/>
<div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-surface-dark border border-white/20 text-slate-400 font-mono text-sm group-hover/item:border-primary group-hover/item:text-primary transition-colors">F</div>
<div class="flex grow flex-col gap-1">
<p class="text-slate-900 dark:text-white text-lg font-bold leading-tight group-hover/item:text-primary transition-colors">Organizing people &amp; plans</p>
<p class="text-slate-500 dark:text-[#ce9d8d] text-sm font-normal leading-normal">Leadership, event planning, or management.</p>
</div>
<div class="absolute inset-0 rounded-lg border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary/5 pointer-events-none transition-all"></div>
</label>
</div>
</div>
</div>
<!-- Footer Action -->
<div class="flex justify-between items-center px-4">
<button class="text-slate-400 hover:text-white text-sm font-medium transition-colors flex items-center gap-2">
<span class="material-symbols-outlined">arrow_back</span>
                        Previous
                    </button>
<button class="group relative flex items-center justify-center overflow-hidden rounded-full h-14 px-10 bg-flame-gradient text-white text-lg font-bold leading-normal tracking-wide shadow-[0_4px_20px_rgba(255,102,51,0.4)] hover:shadow-[0_6px_25px_rgba(255,102,51,0.6)] hover:translate-y-[-2px] transition-all duration-300">
<span class="relative z-10 flex items-center gap-2">
                            Next Question 
                            <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</span>
<!-- Shimmer effect overlay -->
<div class="absolute inset-0 z-0 bg-gradient-to-r from-transparent via-white/20 to-transparent translate-x-[-100%] group-hover:animate-[shimmer_1s_infinite]"></div>
</button>
</div>
</div>
</main>
<!-- Subtle footer decorative text -->
<footer class="py-6 text-center">
<p class="text-slate-600 dark:text-slate-600 text-xs font-mono">Seeker © 2024 • Discover your cosmic path</p>
</footer>
</div>
<!-- Animation Keyframes -->
<style>
        @keyframes shimmer {
            100% {
                transform: translateX(100%);
            }
        }
    </style>
</body></html>
