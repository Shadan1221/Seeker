<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ff6633",

<style>
        /* Custom styles for cosmic effects */
        .orbit-ring {
            border: 1px solid rgba(255, 102, 51, 0.1);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        
        .planet-node {
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .planet-node:hover {
            transform: scale(1.15);
            z-index: 20;
            box-shadow: 0 0 30px rgba(255, 102, 51, 0.3);
        }
        
        .pulsing-center {
            box-shadow: 0 0 0 0 rgba(255, 102, 51, 0.7);
            animation: pulse-orange 2s infinite;
        }

        @keyframes pulse-orange {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(255, 102, 51, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 20px rgba(255, 102, 51, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(255, 102, 51, 0);
            }
        }
        
        /* Floating animation for planets */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        
        .float-slow { animation: float 6s ease-in-out infinite; }
        .float-medium { animation: float 5s ease-in-out infinite; }
        .float-fast { animation: float 4s ease-in-out infinite; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1a0f0c; 
        }
        ::-webkit-scrollbar-thumb {
            background: #4b2b20; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ff6633; 
        }
    </style>
